    <!-- Google Fonts: DM Serif Display + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- GitHub Pages SPA routing: restore path from ?p= redirect -->
    <script>
      (function(){
        // Decode the ?p= query param written by 404.html and restore the real URL
        var search = window.location.search;
        if (search.length > 1) {
          var params = {};
          search.slice(1).split('&').forEach(function(s) {
            var idx = s.indexOf('=');
            if (idx > -1) params[s.slice(0, idx)] = decodeURIComponent(s.slice(idx + 1));
          });
          if (params.p !== undefined) {
            // Rebuild: keep the repo prefix (/smart-flashcards) + the SPA route (/review etc.)
            var pathParts = window.location.pathname.split('/');
            var repoPrefix = pathParts[1] ? '/' + pathParts[1] : '';
            var restored = repoPrefix + (params.p || '/') +
              (params.q ? '?' + params.q : '') +
              (window.location.hash || '');
            window.history.replaceState(null, null, restored);
          }
        }
      }());
    </script>
