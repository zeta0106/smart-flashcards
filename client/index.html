<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Smart Flashcards — Effective Learning</title>
    <meta name="description" content="Create, organize, and review flashcards with spaced repetition. Study smarter, not harder." />
    <!-- Google Fonts: DM Serif Display + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- GitHub Pages SPA routing: restore path from ?p= redirect -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= approach from 404.html
        var search = window.location.search;
        if (search.indexOf('?p=') === 0 || search.indexOf('&p=') !== -1) {
          var r = search.slice(1).split('&').reduce(function(o,s){ var p=s.split('='); o[p[0]]=p.slice(1).join('=').replace(/~and~/g,'&'); return o; }, {});
          if (r.p !== undefined) {
            window.history.replaceState(null, null,
              window.location.pathname.split('/').slice(0,2).join('/') + (r.p || '') +
              (r.q ? '?' + r.q : '') + (window.location.hash || '')
            );
          }
        }
      }());
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
