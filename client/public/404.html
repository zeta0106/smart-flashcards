<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Smart Flashcards</title>
    <!-- GitHub Pages SPA redirect: forward all 404s back to index.html with the path encoded as a query param -->
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
